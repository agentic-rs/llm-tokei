name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - archive: llm-tokei-darwin-arm64.tar.gz
            artifact: llm-tokei-darwin-arm64
            bin: llm-tokei
            os: macos-latest
            target: aarch64-apple-darwin
          - archive: llm-tokei-linux-x64.tar.gz
            artifact: llm-tokei-linux-x64
            bin: llm-tokei
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - archive: llm-tokei-win32-x64.zip
            artifact: llm-tokei-win32-x64
            bin: llm-tokei.exe
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.artifact }}/bin/${{ matrix.bin }}
      - name: Package tarball
        if: ${{ !endsWith(matrix.archive, '.zip') }}
        shell: bash
        run: |
          cd dist/${{ matrix.artifact }}
          tar -czf ../${{ matrix.archive }} bin
      - name: Package zip
        if: ${{ endsWith(matrix.archive, '.zip') }}
        shell: pwsh
        run: |
          Compress-Archive -Path dist/${{ matrix.artifact }}/bin -DestinationPath dist/${{ matrix.archive }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  upload-release-assets:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Upload release assets
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --notes "Release $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.zip --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish-npm:
    needs: build-artifacts
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@v8
        with:
          pattern: llm-tokei-*
          path: npm
          merge-multiple: false
      - name: Prepare npm packages
        run: |
          version="${GITHUB_REF_NAME#v}"
          cargo_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "llm-tokei") | .version')
          if [[ "$version" != "$cargo_version" ]]; then
            echo "tag version $version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi
          if [[ "$version" == *-* ]]; then
            echo "NPM_DIST_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi
          node npm/scripts/prepare.mjs --version "$version"
      - name: Check npm package contents
        run: |
          for package in dist/npm/*; do
            npm pack --dry-run --json "$package" >/dev/null
          done
      - name: Publish platform packages
        run: |
          publish_if_missing() {
            package_dir="$1"
            package_name=$(node -p "require('./' + process.argv[1] + '/package.json').name" "$package_dir")
            package_version=$(node -p "require('./' + process.argv[1] + '/package.json').version" "$package_dir")
            if npm view "$package_name@$package_version" version --prefer-online >/dev/null 2>&1; then
              echo "$package_name@$package_version is already published"
            else
              npm publish --access public --tag "$NPM_DIST_TAG" "$package_dir"
            fi
          }
          publish_if_missing dist/npm/llm-tokei-darwin-arm64
          publish_if_missing dist/npm/llm-tokei-linux-x64
          publish_if_missing dist/npm/llm-tokei-win32-x64
      - name: Publish wrapper package
        run: |
          package_dir=dist/npm/llm-tokei
          package_name=$(node -p "require('./' + process.argv[1] + '/package.json').name" "$package_dir")
          package_version=$(node -p "require('./' + process.argv[1] + '/package.json').version" "$package_dir")
          if npm view "$package_name@$package_version" version --prefer-online >/dev/null 2>&1; then
            echo "$package_name@$package_version is already published"
          else
            npm publish --access public --tag "$NPM_DIST_TAG" "$package_dir"
          fi
      - name: Verify published packages
        run: |
          verify_published() {
            package_name="$1"
            package_version="$2"
            for attempt in {1..6}; do
              if published_version=$(npm view "$package_name@$package_version" version --prefer-online 2>/dev/null) \
                && [[ "$published_version" == "$package_version" ]]; then
                echo "verified $package_name@$package_version"
                return 0
              fi
              if [[ "$attempt" -eq 6 ]]; then
                echo "failed to verify $package_name@$package_version after $attempt attempts" >&2
                return 1
              fi
              echo "$package_name@$package_version is not visible yet; retrying in 10 seconds ($attempt/6)"
              sleep 10
            done
          }
          for package_dir in dist/npm/*; do
            package_name=$(node -p "require('./' + process.argv[1] + '/package.json').name" "$package_dir")
            package_version=$(node -p "require('./' + process.argv[1] + '/package.json').version" "$package_dir")
            verify_published "$package_name" "$package_version"
          done

  publish-crate:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
