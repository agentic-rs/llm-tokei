name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - archive: llm-tokei-darwin-arm64.tar.gz
            artifact: llm-tokei-darwin-arm64
            bin: llm-tokei
            os: macos-latest
            target: aarch64-apple-darwin
          - archive: llm-tokei-linux-x64.tar.gz
            artifact: llm-tokei-linux-x64
            bin: llm-tokei
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - archive: llm-tokei-win32-x64.zip
            artifact: llm-tokei-win32-x64
            bin: llm-tokei.exe
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.artifact }}/bin/${{ matrix.bin }}
      - name: Package tarball
        if: ${{ !endsWith(matrix.archive, '.zip') }}
        shell: bash
        run: |
          cd dist/${{ matrix.artifact }}
          tar -czf ../${{ matrix.archive }} bin
      - name: Package zip
        if: ${{ endsWith(matrix.archive, '.zip') }}
        shell: pwsh
        run: |
          Compress-Archive -Path dist/${{ matrix.artifact }}/bin -DestinationPath dist/${{ matrix.archive }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  upload-release-assets:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Upload release assets
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Release $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
