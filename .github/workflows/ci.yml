name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  model-catalog:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm/model-catalog
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: npm/model-catalog/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm pack --dry-run

  model-price-history:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm/model-price-history
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: npm/model-price-history/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm pack --dry-run

  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: llm-tokei-darwin-arm64
            bin: llm-tokei
            os: macos-latest
            target: aarch64-apple-darwin
          - artifact: llm-tokei-linux-x64
            bin: llm-tokei
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - artifact: llm-tokei-win32-x64
            bin: llm-tokei.exe
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.artifact }}/bin/${{ matrix.bin }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  npm-package:
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - uses: actions/download-artifact@v8
        with:
          pattern: llm-tokei-*
          path: npm
          merge-multiple: false
      - name: Prepare npm packages
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "llm-tokei") | .version')
          node npm/scripts/prepare.mjs --version "$version"
      - name: Check npm package contents
        run: |
          for package in dist/npm/*; do
            npm pack --dry-run --json "$package" >/dev/null
          done
          if grep -Fq '](docs/' dist/npm/llm-tokei/README.md; then
            echo "generated npm README contains relative docs links" >&2
            exit 1
          fi
