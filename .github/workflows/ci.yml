name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: llm-tokei-darwin-arm64
            bin: llm-tokei
            os: macos-latest
            target: aarch64-apple-darwin
          - artifact: llm-tokei-linux-x64
            bin: llm-tokei
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - artifact: llm-tokei-win32-x64
            bin: llm-tokei.exe
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.artifact }}/bin/${{ matrix.bin }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
